services:
  - type: web
    name: smart-campus-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGO_URI
        scope: build
        sync: false
      - key: JWT_SECRET
        scope: build
        sync: false
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://your-vercel-app.vercel.app
